kind = "web"
previewPath = "/"
title = "R Detailing"
version = "1.0.0"
id = "artifacts/r-detailing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/r-detailing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/r-detailing", "run", "build" ]
publicDir = "artifacts/r-detailing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/"
